services:
  postgres:
    image: postgres:17-alpine
    container_name: callao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: callao_db
      POSTGRES_USER: callao_user
      POSTGRES_PASSWORD: callao_pass
    ports:
      - "5433:5432"
    volumes:
      - callao_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callao_user -d callao_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  callao_postgres_data:
