server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: callao-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/CALLAO?currentSchema=callao}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    schemas: callao
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${APP_JWT_SECRET:8f7e2d9a4b6c1d3e5f7a9b0c2d4e6f8a1b3c5d7e9f1a2b4c6d8e0f2a4b6c8d0e}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,https://callao-ame9.vercel.app}
  gmail-api:
    client-id: ${GMAIL_CLIENT_ID}
    client-secret: ${GMAIL_CLIENT_SECRET}
    refresh-token: ${GMAIL_REFRESH_TOKEN}
    sender: ${GMAIL_SENDER}
